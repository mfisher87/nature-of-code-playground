<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.8.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.8.0/addons/p5.sound.min.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />
    <title>Chapter 0 - example 0.6 - perlin noise random walk</title>
  </head>
  <body>
    <main></main>

    <script>
      class Walker {
        constructor() {
          this.tx = 0;
          this.ty = 10000;
        }

        step() {
          this.x = map(noise(this.tx), 0, 1, 0, width);
          this.y = map(noise(this.ty), 0, 1, 0, height);
          this.tx += 0.01;
          this.ty += 0.01;
        }

        show() {
          strokeWeight(2);
          fill(127);
          stroke(0);
          circle(this.x, this.y, 48);
        }
      }

      let walker;

      // p5.js executes setup() once when the sketch starts
      function setup() {
        createCanvas(640, 240);
        walker = new Walker();
        background(255);
      }

      // p5.js calls draw() every frame
      function draw() {
        walker.step();
        walker.show();
      }
    </script>

  </body>
</html>
